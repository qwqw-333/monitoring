x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - external
    ports:
      - 80:80
      - 443:443
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - traefik-data:/data
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - ACME_EMAIL=${ACME_EMAIL:-your-email@example.com}
      - DOMAIN=${DOMAIN:-example.duckdns.org}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/ping | grep -q OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.rule=Host(`traefik-dashboard.${DOMAIN:-example.duckdns.org}`)"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=manager:$$apr1$$lbVzqQeO$$Tl4xlk1S7a.qlKBNr9Rdf1"
      - "traefik.http.middlewares.traefik-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.traefik.middlewares=traefik-https-redirect"
      - "traefik.http.routers.traefik-secure.entrypoints=websecure"
      - "traefik.http.routers.traefik-secure.rule=Host(`traefik-dashboard.${DOMAIN:-example.duckdns.org}`)"
      - "traefik.http.routers.traefik-secure.middlewares=traefik-auth"
      - "traefik.http.routers.traefik-secure.tls=true"
      - "traefik.http.routers.traefik-secure.tls.certresolver=duckdns"
      - "traefik.http.routers.traefik-secure.tls.domains[0].main=${DOMAIN:-example.duckdns.org}"
      - "traefik.http.routers.traefik-secure.tls.domains[0].sans=*.${DOMAIN:-example.duckdns.org}"
      - "traefik.http.routers.traefik-secure.service=api@internal"
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --ping=true
      - --ping.entryPoint=traefik
      - --log.level=INFO
      - --accesslog=true
      - --metrics.prometheus=true
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addrouterslabels=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entryPoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.asDefault=true
      - --entrypoints.websecure.http.tls.certresolver=duckdns
      - --entrypoints.traefik.address=127.0.0.1:9000
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedByDefault=false
      - --certificatesresolvers.duckdns.acme.email=${ACME_EMAIL:-your-email@example.com}
      - --certificatesresolvers.duckdns.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.duckdns.acme.dnschallenge.provider=duckdns
      - --certificatesresolvers.duckdns.acme.dnschallenge.disablepropagationcheck=true
      - --certificatesresolvers.duckdns.acme.dnschallenge.delaybeforecheck=30
      - --certificatesresolvers.duckdns.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53

  coredns:
    image: coredns/coredns:latest
    container_name: coredns
    restart: always
    logging: *default-logging
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./coredns/Corefile:/Corefile:ro
      - coredns-config:/etc/coredns
    networks:
      - internal
      - external

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: always
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.kuma.rule=Host(`kuma.${DOMAIN:-example.duckdns.org}`)"
      - "traefik.http.routers.kuma.entrypoints=websecure"
      - "traefik.http.routers.kuma.tls=true"
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"
    volumes:
      - uptime-kuma:/app/data
    networks:
      - internal

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.vault.rule=Host(`vault.${DOMAIN:-example.duckdns.org}`)"
      - "traefik.http.routers.vault.entrypoints=websecure"
      - "traefik.http.routers.vault.tls=true"
      - "traefik.http.services.vault.loadbalancer.server.port=80"
    volumes:
      - vaultwarden:/data
    networks:
      - internal
    environment:
      - SIGNUPS_ALLOWED=true
      - DOMAIN=https://vault.${DOMAIN:-example.duckdns.org}
      - WEBSOCKET_ENABLED=true
      - LOG_LEVEL=warn
      - EXTENDED_LOGGING=true
      - ROCKET_PORT=80

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=20GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN:-example.duckdns.org}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus.middlewares=traefik-auth"

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=error
      - GF_AUTH_TOKEN_ROTATION_INTERVAL_MINUTES=1440
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN:-example.duckdns.org}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - internal

  snmp-exporter:
    image: prom/snmp-exporter
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116"
    volumes:
      - ./snmp/snmp.yml:/etc/snmp_exporter/snmp.yml
    networks:
      - internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    logging: *default-logging
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - internal

  freeswitch-exporter:
    build: ./freeswitch-exporter
    container_name: freeswitch-exporter
    restart: unless-stopped
    logging: *default-logging
    network_mode: host
    environment:
      - FREESWITCH_ESL_PASSWORD=${FREESWITCH_ESL_PASSWORD:-ClueCon}
      - ESL_TIMEOUT=5

volumes:
  traefik-data:
  coredns-config:
  uptime-kuma:
  vaultwarden:
  prometheus_data:
  grafana_data:
  loki-data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
