auths:
  public_v2:
    community: public
    version: 2

modules:
  # Grandstream IP phone (GXP и др.): enterprise 42397.1.3.*
  # На GXP2170 всего ~32 OID; часть — строки, часть INTEGER.
  grandstream_custom:
    walk:
      - 1.3.6.1.4.1.42397.1.3
    metrics:
      # --- SIP: регистрация линий (STRING "0"/"1") ---
      - name: gs_sip_account_1_status
        oid: 1.3.6.1.4.1.42397.1.3.2.1.1.0.0
        type: DisplayString
        help: SIP account 1 registered (1=yes)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_account_2_status
        oid: 1.3.6.1.4.1.42397.1.3.2.1.2.0.0
        type: DisplayString
        help: SIP account 2 registered (1=yes)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_account_3_status
        oid: 1.3.6.1.4.1.42397.1.3.2.1.3.0.0
        type: DisplayString
        help: SIP account 3 registered (1=yes)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_account_4_status
        oid: 1.3.6.1.4.1.42397.1.3.2.1.4.0.0
        type: DisplayString
        help: SIP account 4 registered (1=yes)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_account_5_status
        oid: 1.3.6.1.4.1.42397.1.3.2.1.5.0.0
        type: DisplayString
        help: SIP account 5 registered (1=yes)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_account_6_status
        oid: 1.3.6.1.4.1.42397.1.3.2.1.6.0.0
        type: DisplayString
        help: SIP account 6 registered (1=yes)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1

      # --- INTEGER: трубка и прочие флаги (Grandstream MIB без имени в прошивке) ---
      - name: gs_phone_hook_state
        oid: 1.3.6.1.4.1.42397.1.3.2.2.0.0
        type: gauge
        help: Hook/handset state (0/1; типично 0=on-hook, 1=off-hook — уточняйте по модели)
      - name: gs_phone_aux_int_1
        oid: 1.3.6.1.4.1.42397.1.3.4.1.0.0
        type: gauge
        help: Auxiliary integer .1.3.4.1 (см. MIB Grandstream / документацию модели)
      - name: gs_phone_aux_int_2
        oid: 1.3.6.1.4.1.42397.1.3.4.3.0.0
        type: gauge
        help: Auxiliary integer .1.3.4.3 (см. MIB Grandstream / документацию модели)

      # --- Номер/extension SIP-аккаунта (если строка — только цифры) ---
      - name: gs_sip_line_1_extension
        oid: 1.3.6.1.4.1.42397.1.3.2.3.1.0.0
        type: DisplayString
        help: SIP line 1 user/extension (numeric string only)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_line_2_extension
        oid: 1.3.6.1.4.1.42397.1.3.2.3.2.0.0
        type: DisplayString
        help: SIP line 2 user/extension (numeric string only)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_line_3_extension
        oid: 1.3.6.1.4.1.42397.1.3.2.3.3.0.0
        type: DisplayString
        help: SIP line 3 user/extension (numeric string only)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_line_4_extension
        oid: 1.3.6.1.4.1.42397.1.3.2.3.4.0.0
        type: DisplayString
        help: SIP line 4 user/extension (numeric string only)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_line_5_extension
        oid: 1.3.6.1.4.1.42397.1.3.2.3.5.0.0
        type: DisplayString
        help: SIP line 5 user/extension (numeric string only)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1
      - name: gs_sip_line_6_extension
        oid: 1.3.6.1.4.1.42397.1.3.2.3.6.0.0
        type: DisplayString
        help: SIP line 6 user/extension (numeric string only)
        regex_extracts:
          "":
            - regex: ^(\d+)$
              value: $1

      # --- Заполнены ли поля Display Name / SIP Server (текст в Prometheus не кладём) ---
      - name: gs_sip_line_1_display_name_set
        oid: 1.3.6.1.4.1.42397.1.3.2.4.1.0.0
        type: DisplayString
        help: Line 1 display name non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_2_display_name_set
        oid: 1.3.6.1.4.1.42397.1.3.2.4.2.0.0
        type: DisplayString
        help: Line 2 display name non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_3_display_name_set
        oid: 1.3.6.1.4.1.42397.1.3.2.4.3.0.0
        type: DisplayString
        help: Line 3 display name non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_4_display_name_set
        oid: 1.3.6.1.4.1.42397.1.3.2.4.4.0.0
        type: DisplayString
        help: Line 4 display name non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_5_display_name_set
        oid: 1.3.6.1.4.1.42397.1.3.2.4.5.0.0
        type: DisplayString
        help: Line 5 display name non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_6_display_name_set
        oid: 1.3.6.1.4.1.42397.1.3.2.4.6.0.0
        type: DisplayString
        help: Line 6 display name non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"

      - name: gs_sip_line_1_server_set
        oid: 1.3.6.1.4.1.42397.1.3.2.5.1.0.0
        type: DisplayString
        help: Line 1 SIP server field non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_2_server_set
        oid: 1.3.6.1.4.1.42397.1.3.2.5.2.0.0
        type: DisplayString
        help: Line 2 SIP server field non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_3_server_set
        oid: 1.3.6.1.4.1.42397.1.3.2.5.3.0.0
        type: DisplayString
        help: Line 3 SIP server field non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_4_server_set
        oid: 1.3.6.1.4.1.42397.1.3.2.5.4.0.0
        type: DisplayString
        help: Line 4 SIP server field non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_5_server_set
        oid: 1.3.6.1.4.1.42397.1.3.2.5.5.0.0
        type: DisplayString
        help: Line 5 SIP server field non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"
      - name: gs_sip_line_6_server_set
        oid: 1.3.6.1.4.1.42397.1.3.2.5.6.0.0
        type: DisplayString
        help: Line 6 SIP server field non-empty (1=yes)
        regex_extracts:
          "":
            - regex: ^.+$
              value: "1"
            - regex: ^$
              value: "0"

      # --- Версии прошивки (4 компонента a.b.c.d → 4 gauge на компонент) ---
      - name: gs_phone_fw_p1
        oid: 1.3.6.1.4.1.42397.1.3.3.1.0.0
        type: DisplayString
        help: Firmware program 1 (a.b.c.d split)
        regex_extracts:
          a:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $1
          b:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $2
          c:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $3
          d:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $4
      - name: gs_phone_fw_p2
        oid: 1.3.6.1.4.1.42397.1.3.3.2.0.0
        type: DisplayString
        help: Firmware program 2 (a.b.c.d split)
        regex_extracts:
          a:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $1
          b:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $2
          c:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $3
          d:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $4
      - name: gs_phone_fw_p3
        oid: 1.3.6.1.4.1.42397.1.3.3.3.0.0
        type: DisplayString
        help: Firmware program 3 (a.b.c.d split)
        regex_extracts:
          a:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $1
          b:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $2
          c:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $3
          d:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $4
      - name: gs_phone_fw_p4
        oid: 1.3.6.1.4.1.42397.1.3.3.4.0.0
        type: DisplayString
        help: Firmware program 4 (a.b.c.d split)
        regex_extracts:
          a:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $1
          b:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $2
          c:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $3
          d:
            - regex: ^(\d+)\.(\d+)\.(\d+)\.(\d+)$
              value: $4
