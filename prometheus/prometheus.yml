global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'fusionpbx test'
    scrape_interval: 1m
    metrics_path: /metrics.txt
    scheme: https
    tls_config:
      insecure_skip_verify: true 
    static_configs:
      - targets: ['172.30.0.210:443']

  - job_name: 'kv umz'
    scrape_interval: 1m
    metrics_path: /metrics.txt
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['172.30.0.195:443']
